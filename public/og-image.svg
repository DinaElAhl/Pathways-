<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#faf5ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="280" fill="#c7d2fe" opacity="0.35"/>
  <circle cx="160" cy="560" r="220" fill="#e9d5ff" opacity="0.35"/>

  <!-- logo mark -->
  <g transform="translate(96,90)">
    <rect width="86" height="86" rx="22" fill="url(#brand)"/>
    <g transform="translate(20,20)" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round">
      <path d="M2 44C13 40 17 28 24 16S38 0 44 0"/>
      <circle cx="2" cy="44" r="4.5" fill="#ffffff" stroke="none"/>
      <circle cx="44" cy="2" r="4.5" fill="#ffffff" stroke="none"/>
    </g>
    <text x="108" y="58" font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="46" font-weight="700" fill="#0f172a">Pathways</text>
  </g>

  <!-- headline -->
  <text x="96" y="300" font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="74" font-weight="700" fill="#0f172a">One place to find</text>
  <text x="96" y="392" font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="74" font-weight="700" fill="url(#text)">whatever you need to learn.</text>

  <!-- subhead -->
  <text x="98" y="462" font-family="'Inter','Segoe UI',sans-serif" font-size="30" fill="#475569">Curated, mentor-guided pathways · lesson plans · courses · tools · community</text>

  <!-- pills -->
  <g font-family="'Inter','Segoe UI',sans-serif" font-size="24" font-weight="600">
    <rect x="96"  y="510" width="180" height="56" rx="28" fill="#eef2ff"/>
    <text x="186" y="547" fill="#4338ca" text-anchor="middle">Learners</text>
    <rect x="292" y="510" width="170" height="56" rx="28" fill="#eef2ff"/>
    <text x="377" y="547" fill="#4338ca" text-anchor="middle">Teachers</text>
    <rect x="478" y="510" width="160" height="56" rx="28" fill="#eef2ff"/>
    <text x="558" y="547" fill="#4338ca" text-anchor="middle">Schools</text>
    <rect x="654" y="510" width="135" height="56" rx="28" fill="#faf5ff"/>
    <text x="721" y="547" fill="#7e22ce" text-anchor="middle">+ AI</text>
  </g>
</svg>
